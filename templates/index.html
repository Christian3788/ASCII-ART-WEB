<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ASCII Art Web Generator</title>
    <!-- Import clean high-visibility typography from Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-color: #f8fafc;        /* High-visibility clean light background */
            --card-bg: #ffffff;         /* Pure white box for the main container */
            --text-main: #0f172a;       /* Deep slate black for crisp text contrast */
            --text-muted: #475569;      /* Readable slate gray for descriptions */
            --accent-primary: #2563eb;    /* Royal Blue for focal points and buttons */
            --border-color: #cbd5e1;    /* Light clean border layout lines */
            
            /* HIGH-VISIBILITY RESULT CONTAINER CONFIGURATION */
            --result-bg: #1e293b;       /* Dark charcoal slate for excellent contrast */
            --result-text: #ffffff;     /* Pure crisp white text inside the output */

            /* NEW VISUAL DESIGN VARIABLES FOR ERROR PANEL HANDLING */
            --error-bg: #fef2f2;        /* Soft red fill layer */
            --error-text: #991b1b;      /* Dark blood red for accessible text reading */
            --error-border: #fca5a5;    /* Accent error framing line */
        }

        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            max-width: 900px; 
            margin: 0 auto; 
            padding: 50px 20px; 
            background-color: var(--bg-color); 
            color: var(--text-main);
            line-height: 1.6;
        }

        h1 {
            font-size: 2.4rem;
            font-weight: 700;
            color: var(--text-main);
            margin-bottom: 5px;
            letter-spacing: -0.5px;
        }

        h1 span {
            color: var(--accent-primary);
        }

        .subtitle {
            color: var(--text-muted);
            margin-bottom: 35px;
            font-size: 1.05rem;
        }

        form {
            background: var(--card-bg);
            padding: 35px;
            border-radius: 16px;
            border: 1px solid var(--border-color);
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05), 0 2px 4px -1px rgba(0, 0, 0, 0.03);
        }

        textarea { 
            width: 100%; 
            padding: 18px; 
            font-size: 16px; 
            background-color: #f1f5f9;
            color: var(--text-main);
            border: 1px solid var(--border-color); 
            border-radius: 10px; 
            box-sizing: border-box; 
            font-family: inherit;
            resize: vertical;
            transition: all 0.2s ease;
        }

        textarea:focus {
            outline: none;
            border-color: var(--accent-primary);
            background-color: #ffffff;
            box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.15);
        }

        .options { 
            margin: 30px 0; 
            display: flex;
            gap: 25px;
            flex-wrap: wrap;
        }

        .radio-container {
            display: flex;
            align-items: center;
            cursor: pointer;
            user-select: none;
            color: var(--text-main);
            font-weight: 500;
            font-size: 0.95rem;
        }

        .radio-container input {
            margin-right: 10px;
            accent-color: var(--accent-primary);
            transform: scale(1.2);
        }

        button { 
            background-color: var(--accent-primary); 
            color: white; 
            border: none; 
            padding: 14px 32px; 
            font-size: 16px; 
            font-weight: 600;
            border-radius: 10px; 
            cursor: pointer; 
            transition: all 0.2s ease;
        }

        button:hover { 
            background-color: #1d4ed8;
            box-shadow: 0 4px 12px rgba(37, 99, 235, 0.25);
        }

        button:active {
            transform: scale(0.98);
        }

        /* NEW HIGH-VISIBILITY CANVAS SPECIFICATIONS */
        .result-container { 
            margin-top: 40px; 
            background: var(--result-bg);
            color: var(--result-text);
            padding: 30px; 
            border-radius: 14px; 
            border: 1px solid #0f172a;
            overflow-x: auto; 
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
        }

        .result-title {
            color: #94a3b8;
            margin-top: 0;
            margin-bottom: 20px;
            font-size: 0.85rem;
            font-weight: 600;
            letter-spacing: 1px;
            text-transform: uppercase;
            border-bottom: 1px solid #334155;
            padding-bottom: 12px;
        }

        /* DYNAMIC APP ERROR CONTAINER STYLING */
        .error-container {
            margin-bottom: 25px;
            background-color: var(--error-bg);
            color: var(--error-text);
            border: 1px solid var(--error-border);
            padding: 18px 24px;
            border-radius: 12px;
            font-size: 0.95rem;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 12px;
            box-shadow: 0 2px 4px rgba(153, 27, 27, 0.02);
        }

        /* Crisp, clear character definition alignment styles */
        pre { 
            margin: 0; 
            font-family: 'Consolas', 'SF Mono', 'Courier New', monospace; 
            font-size: 14px; 
            line-height: 1.2; 
            letter-spacing: 0px;
        }

        .reset-link {
            display: inline-block;
            margin-top: 25px;
            color: var(--text-muted);
            text-decoration: none;
            font-size: 0.95rem;
            font-weight: 500;
        }

        .reset-link:hover {
            color: var(--accent-primary);
            text-decoration: underline;
        }
    </style>
</head>
<body>

    <h1>ASCII Art <span>Web Studio</span></h1>
    <div class="subtitle">Convert custom text strings into functional terminal text banners instantly.</div>
    
    <!-- Appends and displays system routing / field runtime errors validation dynamically -->
    {{if .Error}}
    <div class="error-container">
        <span>⚠️</span>
        <div>{{.Error}}</div>
    </div>
    {{end}}

    <form action="/ascii-art" method="POST">
        <textarea name="text" rows="5" placeholder="Enter the text parameters you want transformed..."></textarea>
        
        <div class="options">
            <label class="radio-container">
                <input type="radio" name="banner" value="standard" checked> Standard Font
            </label>
            <label class="radio-container">
                <input type="radio" name="banner" value="shadow"> Shadow Font
            </label>
            <label class="radio-container">
                <input type="radio" name="banner" value="thinkertoy"> Thinkertoy Font
            </label>
        </div>
        
        <button type="submit">Generate Output</button>
    </form>

    <!-- Appends and prints the resulting data canvas values cleanly -->
    {{if .Result}}
    <div class="result-container">
        <div class="result-title">// Processing completed. Terminal output block:</div>
        <pre>{{.Result}}</pre>
    </div>
    <a href="/" class="reset-link">← Clear and rewrite string</a>
    {{end}}

</body>
</html>
