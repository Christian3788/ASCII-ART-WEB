<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ASCII Art Web Generator</title>
    <style>
        body { font-family: sans-serif; max-width: 800px; margin: 40px auto; padding: 0 20px; background-color: #f9f9f9; color: #333; }
        textarea { width: 100%; padding: 10px; font-size: 16px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
        .options { margin: 20px 0; }
        label { margin-right: 15px; font-weight: bold; cursor: pointer; }
        button { background-color: #007bff; color: white; border: none; padding: 10px 20px; font-size: 16px; border-radius: 4px; cursor: pointer; }
        button:hover { background-color: #0056b3; }
        .result-container { margin-top: 30px; background: #222; color: #00ff00; padding: 20px; border-radius: 6px; overflow-x: auto; }
        pre { margin: 0; font-family: monospace; line-height: 1.2; }
    </style>
</head>
<body>

    <h1>ASCII Art Web Generator</h1>
    <p>Type your message below, choose a style, and generate your ASCII banner.</p>
    
    <form action="/ascii-art" method="POST">
        <textarea name="text" rows="6" placeholder="Write something here..." required></textarea>
        
        <div class="options">
            <label><input type="radio" name="banner" value="standard" checked> Standard</label>
            <label><input type="radio" name="banner" value="shadow"> Shadow</label>
            <label><input type="radio" name="banner" value="thinkertoy"> Thinkertoy</label>
        </div>
        
        <button type="submit">Generate Banner</button>
    </form>

    {{if .}}
    <div class="result-container">
        <h3>Ascii Art Result:</h3>
        <pre>{{.}}</pre>
    </div>
    <p><a href="/">Reset / Clear</a></p>
    {{end}}

</body>
</html>
